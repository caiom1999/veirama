<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Veirama</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
}
.container{
    text-align:center;
}
.logo{
    max-width:420px;
    width:80vw;
    height:auto;
}
.coming-soon{
    margin-top:32px;
    letter-spacing:6px;
    font-size:14px;
    color:#666;
    text-transform:uppercase;
}
.mail{
    margin-top:32px;
    letter-spacing:6px;
    font-size:14px;
    color:#666;
}
</style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Agro Veirama" class="logo">
        <div class="mail">Site em desenvolvimento.</div>
        <div class="mail">Email: agro@veirama.com.br</div>
    </div>
</body>
</html>
